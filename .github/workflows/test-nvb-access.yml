name: Test NVB API Access

on:
  workflow_dispatch:

jobs:
  test-nvb:
    runs-on: ubuntu-latest
    steps:
      - name: Show outbound IP
        run: |
          echo "=== Runner outbound IP ==="
          curl -s https://api.ipify.org
          echo ""
          echo "=== Reverse DNS / geo ==="
          curl -s "https://ipinfo.io/$(curl -s https://api.ipify.org)" || true

      - name: Test NVB API
        run: |
          echo "=== NVB API test ==="
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "https://api.nationalevacaturebank.nl/api/jobs/v3/sites/nationalevacaturebank.nl/jobs?page=1&limit=2&sort=date" \
            -H "Accept: application/json" \
            -H "Referer: https://www.nationalevacaturebank.nl/" \
            -H "Origin: https://www.nationalevacaturebank.nl" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept-Language: nl-NL,nl;q=0.9,en;q=0.8")
          echo "HTTP Status: $STATUS"
          echo "=== Response (first 500 chars) ==="
          head -c 500 /tmp/response.json
          echo ""

          if [ "$STATUS" != "200" ]; then
            echo "::error::NVB API returned $STATUS instead of 200"
            exit 1
          fi
          echo "::notice::NVB API accessible from GitHub Actions runner"
