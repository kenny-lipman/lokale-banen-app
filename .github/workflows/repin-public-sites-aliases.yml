name: Repin public-sites aliases

# Achtergrond: 64 *.vercel.app aliassen voor regio-jobboards zijn historisch
# als deployment-aliases (gepind aan een specifieke deploy-uid) aangemaakt.
# Een nieuwe production-deploy herbindt ze niet automatisch — dit workflow
# doet dat wel, na elke push naar main die de public-sites raakt.
#
# Vervalt zodra deployment-aliases zijn gemigreerd naar project-domains
# (zie docs/migrate-vercel-aliases-to-project-domains.md).

on:
  push:
    branches: [main]
    paths:
      - 'apps/public-sites/**'
      - 'scripts/repin-public-sites-aliases.mjs'
      - '.github/workflows/repin-public-sites-aliases.yml'
      - '.github/scripts/wait-for-vercel-deploy.mjs'
  workflow_dispatch:

concurrency:
  group: repin-public-sites
  cancel-in-progress: false

jobs:
  repin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel production deploy
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_TEAM_ID: team_PlngQPHXlPVJkziKq9MLOr3X
          VERCEL_PUBLIC_SITES_PROJECT_ID: prj_ht1wPrgsG5ktFLFyxTY3avUFMgGt
        run: node .github/scripts/wait-for-vercel-deploy.mjs

      - name: Repin all preview_domain aliases
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_TEAM_ID: team_PlngQPHXlPVJkziKq9MLOr3X
          VERCEL_PUBLIC_SITES_PROJECT_ID: prj_ht1wPrgsG5ktFLFyxTY3avUFMgGt
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/repin-public-sites-aliases.mjs
